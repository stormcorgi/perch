<html class="dark">
<head>
    {% include "./parts/bootstrap-head.html" %}
    <title>{{ book.name }} — perch</title>
    <style>
        html, body { margin:: 0; height: 100%; overflow: hidden; background: #18181b; }
        #viewer-wrap { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; }
        #viewer-frame { width: 100%; height: 100%; border: 0; }
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 56px;
            display: flex; align-items: center; gap: 1rem;
            padding: 0 1rem;
            background: rgba(24, 24, 27, 0.95);
            border-bottom: 1px solid #27272a;
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        .back-btn {
            color: #a1a1aa; font-size: 0.875rem;
            display: inline-flex; align-items: center; gap: 0.25rem;
            padding: 0.4rem 0.75rem; border-radius: 0.5rem;
            transition: all 0.15s;
        }
        .back-btn:hover { background: #27272a; color: #fafafa; }
        .title { color: #fafafa; font-size: 0.9rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .badge { font-size: 0.75rem; color: #71717a; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="javascript:history.back()" class="back-btn" title="戻る">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
        </a>
        <span class="title">{{ book.name }}</span>
        <span class="badge">{{ book.ext }}{% if book.page_count %} · {{ book.page_count }}P{% endif %}</span>
    </div>
    <div id="viewer-wrap">
        <iframe id="viewer-frame"
                src="/static/pdfjs/web/viewer.html?file={{ pdf_url | urlencode | replace('/', '%2F') | replace(':', '%3A') }}"
                allowfullscreen></iframe>
    </div>

    <!-- Auto landscape fullscreen on play (same as player.html) -->
    <script>
    (function () {
        let locked = false;
        function lockLandscape() {
            if (locked || !screen.orientation || !screen.orientation.lock) return;
            screen.orientation.lock('landscape').catch(function () {});
            locked = true;
        }
        function unlockLandscape() {
            if (!locked || !screen.orientation || !screen.orientation.unlock) return;
            try { screen.orientation.unlock(); } catch (e) {}
            locked = false;
        }
        document.getElementById('viewer-frame').addEventListener('load', lockLandscape);
        document.addEventListener('fullscreenchange', function () {
            if (document.fullscreenElement) lockLandscape();
            else unlockLandscape();
        });
    })();
    </script>
</body>
</html>
