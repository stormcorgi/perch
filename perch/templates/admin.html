<html class="dark">
<head>
    {% include "./parts/bootstrap-head.html" %}
    <title>メンテナンス - perch</title>
</head>

<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-800 dark:text-zinc-200 min-h-screen transition-colors duration-200">
    {% include "./parts/header.html" %}

    <main class="max-w-2xl mx-auto px-3 sm:px-6 py-6">

        <!-- Back link -->
        <a href="../"
           class="inline-flex items-center gap-1 text-sm text-zinc-500 dark:text-zinc-400 hover:text-zinc-800 dark:hover:text-zinc-200 transition-colors mb-6">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
            トップに戻る
        </a>

        <h1 class="text-xl sm:text-2xl font-bold tracking-tight mb-6">メンテナンス</h1>

        <!-- Admin cards -->
        <div class="space-y-4">
            <div class="rounded-xl p-5
                        bg-white dark:bg-zinc-900
                        border border-zinc-200 dark:border-zinc-800">
                <h2 class="text-sm font-semibold text-zinc-600 dark:text-zinc-400 mb-3">データベース</h2>
                <form method="POST">
                    <button type="submit" name="task" value="update_db"
                        class="px-5 py-2.5 rounded-lg text-sm font-medium
                               bg-rose-600 hover:bg-rose-500 text-white
                               transition-colors">
                        データベース更新
                    </button>
                </form>
                <form method="POST" class="mt-3">
                    <button type="submit" name="task" value="drop_db"
                        class="px-5 py-2.5 rounded-lg text-sm font-medium
                               bg-zinc-200 dark:bg-zinc-800
                               text-zinc-700 dark:text-zinc-300
                               hover:bg-red-500 hover:text-white
                               dark:hover:bg-red-600 transition-colors"
                        onclick="return confirm('本当に DB を削除しますか？復元できません。')">
                        データベース削除
                    </button>
                </form>
            </div>
        </div>

    </main>

    {% include "./parts/footer.html" %}
    {% include "./parts/bootstrap-js.html" %}
</body>
</html>
