<nav class="fixed top-0 left-0 right-0 z-50 navbar-blur
    bg-white/70 dark:bg-zinc-900/80 border-b border-zinc-200 dark:border-zinc-800">
  <div class="max-w-7xl mx-auto px-3 sm:px-6 h-14 flex items-center justify-between">
    <!-- Logo -->
    <a href="../" class="flex-shrink-0">
      <img src="../static/logo-with-text.png" alt="perch" class="h-8 w-auto">
    </a>

    <!-- Nav links -->
    <div class="hidden sm:flex items-center gap-6 text-sm">
      <a href="../"
        class="text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors">
        トップ
      </a>
    </div>

    <!-- Theme toggle + random -->
    <div class="flex items-center gap-2">
      <a href="../random"
        class="inline-flex items-center gap-1 px-3 py-1.5 text-xs font-medium rounded-lg
               bg-rose-500/10 text-rose-600 dark:text-rose-400
               hover:bg-rose-500/20 transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        Random
      </a>

      <button id="theme-toggle" class="theme-toggle p-2 rounded-lg
          text-zinc-500 hover:text-zinc-700 dark:text-zinc-400 dark:hover:text-zinc-200
          hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors"
        aria-label="テーマ切替">
        <!-- Sun (shown in dark mode) -->
        <svg class="w-5 h-5 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <!-- Moon (shown in light mode) -->
        <svg class="w-5 h-5 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />

      </button>
    </div>
  </div>
</nav>

<!-- Spacer for fixed navbar -->
<div class="h-14"></div>

<script>
  (function () {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;

    function applyTheme(theme) {
      document.documentElement.classList.toggle('dark', theme === 'dark');
      localStorage.setItem('perch-theme', theme);
    }

    // 初期化: 保存済み or システム設定
    var saved = localStorage.getItem('perch-theme');
    if (saved) {
      applyTheme(saved);
    } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
      applyTheme('light');
    } else {
      applyTheme('dark');
    }

    btn.addEventListener('click', function () {
      var isDark = document.documentElement.classList.contains('dark');
      applyTheme(isDark ? 'light' : 'dark');
    });
  })();
</script>
